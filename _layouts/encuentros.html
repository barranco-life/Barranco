<!doctype html>
<html lang="{{ site.lang | default: 'es' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | escape }}">
    <link rel="canonical" href="{{ page.canonical_url }}">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_BO">
    <meta property="og:title" content="{{ page.og_title | default: page.title | escape }}">
    <meta property="og:description" content="{{ page.og_description | default: page.description | escape }}">
    <meta property="og:url" content="{{ page.canonical_url }}">
    <meta property="og:image" content="{{ page.og_image }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.og_title | default: page.title | escape }}">
    <meta name="twitter:description" content="{{ page.og_description | default: page.description | escape }}">
    <meta name="twitter:image" content="{{ page.og_image }}">
    {% include head-custom.html %}
    <style>
      :root {
        color-scheme: light;
        --ink: #1d1b18;
        --muted: #625c53;
        --paper: #fffdf8;
        --wash: #f3efe5;
        --line: #ded6c8;
        --green: #1e5d45;
        --green-dark: #153e31;
        --gold: #d7a64f;
        --shadow: 0 18px 50px rgba(29, 27, 24, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.62;
      }

      a {
        color: var(--green);
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid var(--gold);
        outline-offset: 4px;
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      .site-main {
        overflow-x: clip;
      }

      .hero {
        position: relative;
        min-height: min(760px, 100svh);
        display: grid;
        align-items: end;
        background: #221f1b;
        color: #fffdf8;
      }

      .hero picture,
      .hero img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .hero img {
        object-fit: cover;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(14, 17, 14, 0.2) 0%, rgba(14, 17, 14, 0.34) 38%, rgba(14, 17, 14, 0.78) 100%);
      }

      .hero__content {
        position: relative;
        z-index: 1;
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 132px 20px 34px;
      }

      .hero__content h1 {
        max-width: 860px;
        margin: 0 0 18px;
        font-size: clamp(2.1rem, 8.7vw, 5.9rem);
        line-height: 0.98;
        letter-spacing: 0;
        overflow-wrap: break-word;
      }

      .hero__lead {
        max-width: 680px;
        margin: 0 0 26px;
        font-size: clamp(1.05rem, 3vw, 1.55rem);
        color: rgba(255, 253, 248, 0.92);
      }

      .hero__support {
        margin: 12px 0 0;
        color: rgba(255, 253, 248, 0.82);
        font-size: 0.98rem;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 13px 20px;
        background: var(--green);
        color: #fffdf8;
        font-weight: 700;
        text-decoration: none;
        box-shadow: var(--shadow);
      }

      .button:hover {
        background: var(--green-dark);
      }

      .intro {
        background: var(--wash);
      }

      .section {
        padding: 56px 20px;
      }

      .wrap {
        width: min(1080px, 100%);
        margin: 0 auto;
      }

      .intro__text {
        max-width: 860px;
        margin: 0;
        font-size: clamp(1.1rem, 2.4vw, 1.55rem);
        line-height: 1.5;
        overflow-wrap: break-word;
      }

      .triad {
        display: grid;
        gap: 18px;
        margin-top: 34px;
      }

      .triad__item {
        border-top: 1px solid var(--line);
        padding-top: 18px;
      }

      .triad__item h2,
      .content h2 {
        margin: 0 0 12px;
        font-size: clamp(1.45rem, 4vw, 2.2rem);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .triad__item p,
      .triad__item ul {
        margin: 0;
        color: var(--muted);
      }

      .triad__item ul,
      .content ul {
        padding-left: 1.2rem;
      }

      .image-band {
        display: grid;
        gap: 18px;
      }

      .image-band figure,
      .inline-photo {
        margin: 0;
        overflow: hidden;
        border-radius: 18px;
        background: var(--wash);
      }

      .image-band img,
      .inline-photo img {
        width: 100%;
        object-fit: cover;
      }

      .image-band figcaption {
        padding: 12px 14px 14px;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .content {
        max-width: 780px;
        overflow-wrap: break-word;
      }

      .content h2 {
        margin-top: 44px;
      }

      .content h2:first-child {
        margin-top: 0;
      }

      .content blockquote {
        margin: 22px 0;
        border-left: 4px solid var(--gold);
        padding: 8px 0 8px 18px;
        color: var(--green-dark);
        font-size: 1.18rem;
        font-weight: 700;
      }

      .content pre {
        overflow-x: auto;
        border-radius: 14px;
        padding: 18px;
        background: #26231f;
        color: #fffdf8;
      }

      .cta-panel {
        margin: 44px 0 0;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        background: var(--wash);
      }

      .cta-panel p {
        margin-top: 0;
      }

      .footer-note {
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.95rem;
      }

      @media (min-width: 760px) {
        .hero__content {
          padding: 156px 36px 52px;
        }

        .section {
          padding: 82px 36px;
        }

        .hero__content h1 {
          font-size: clamp(3.6rem, 7vw, 5.9rem);
        }

        .triad {
          grid-template-columns: repeat(3, 1fr);
          gap: 28px;
        }

        .image-band {
          grid-template-columns: 1.15fr 0.85fr;
          align-items: start;
        }

        .image-band figure:first-child {
          grid-row: span 2;
        }
      }
    </style>
  </head>
  <body>
    <main class="site-main">
      {{ content }}
    </main>
  </body>
</html>
